# Content extraction pipeline configuration
# Values here serve as defaults; CLI flags always override.
# Lines starting with # are comments. Remove # to activate a setting.

# --- Output ---
output:
  dir: "content"
  slug_max_length: 80           # Max characters in filename slug
  overwrite: false              # Overwrite existing files

# --- Subtitle preferences ---
subtitles:
  lang: null                    # Force subtitle language code (e.g. en, zh-Hans, ja)
  prefer_auto: false            # Prefer auto-generated subs over manual

# --- Authentication ---
auth:
  cookies_from_browser: null    # Browser name (chrome, firefox, edge, safari, opera, brave)
  cookies: null                 # Path to Netscape-format cookies.txt file

# --- Network ---
network:
  retries: 3                    # Retry attempts for network errors
  backoff_base: 2               # Exponential backoff base (seconds): wait = base^attempt

# --- Whisper audio fallback ---
whisper:
  enabled: true                 # Set false to disable Whisper fallback (same as --no-whisper)
  model: "large-v3"             # Model size: tiny, base, small, medium, large-v3
  device: "auto"                # Device: auto, cuda, cpu
  beam_size: 5                  # Beam search width (higher = more accurate, slower)
  vad_filter: true              # Voice activity detection filter
  audio_quality: "0"            # yt-dlp audio quality (0 = best)

# --- LLM (Azure OpenAI) ---
llm:
  model: null                   # Azure OpenAI deployment name (null = AZURE_OPENAI_DEPLOYMENT from .env)
  polish_model: null            # Override deployment for polish (null = same as model)
  max_workers: 8                # Parallel LLM request workers
  timeout: 120                  # API call timeout (seconds)
  rate_limit:
    tpm: 150000                 # Azure OpenAI tokens-per-minute limit
    rpm: 150                    # Azure OpenAI requests-per-minute limit
    threshold: 0.8              # Throttle when usage reaches this fraction of limits
  polish:
    chunk_size_cjk: 500         # Polish chunk size for CJK text (characters)
    chunk_size: 1000            # Polish chunk size for non-CJK text (characters)
    context_ratio: 0.1          # Context overlap as fraction of chunk size
  error_patterns:               # Patterns that indicate LLM error responses
    - "rate limit"
    - "overloaded"
  # Credentials in .env (NOT here — secrets stay out of config):
  #   AZURE_OPENAI_API_KEY=your-key
  #   AZURE_OPENAI_API_BASE=https://your-resource.openai.azure.com/
  #   AZURE_OPENAI_API_VERSION=2024-02-15-preview
  #   AZURE_OPENAI_DEPLOYMENT=gpt-4o

# --- Text processing ---
text:
  cjk_threshold: 0.3           # Fraction of CJK chars to trigger CJK mode (0.0-1.0)
  paragraph_gap_seconds: 4.0    # Silence gap (seconds) that triggers a paragraph break
  sentence_break_count: 6       # Number of sentences before forced paragraph break

# --- Processing flags ---
flags:
  no_chapters: false            # Ignore chapter markers, output flat transcript
  include_description: false    # Include video description in output

# --- Article extraction ---
articles:
  enabled: true                  # Enable web article extraction
  timeout: 30                    # HTTP request timeout (seconds)
  user_agent_rotation: true      # Rotate User-Agent headers to avoid blocks
  verify_ssl: true               # Set false for corporate firewalls with custom CA
  include_tables: true           # Preserve tables in extracted content
  include_links: false           # Include hyperlinks in extracted text
  include_images: false          # Include image references in output
  min_content_length: 100        # Skip pages with less text (characters)

# --- PDF extraction (opendataloader-pdf, requires Java 11+) ---
pdf:
  enabled: true                    # Enable PDF extraction pipeline
  timeout: 60                      # HTTP request timeout (seconds)
  user_agent_rotation: true        # Rotate User-Agent headers to avoid blocks
  verify_ssl: true                 # Set false for corporate firewalls with custom CA
  min_content_length: 200          # Skip PDFs with less text (characters)
  include_abstract: true           # Extract abstract from text (if present)
  strip_references: false          # Remove References/Bibliography section
  max_pages: 0                     # Max pages to extract (0 = unlimited)
  table_method: "default"          # Table detection: "default" (border) or "cluster" (border + cluster)
  reading_order: "xycut"           # Reading order: "xycut" (XY-Cut++ algorithm) or "off"
  use_struct_tree: true            # Use PDF structure tree for heading detection
  image_format: "png"              # Image output format: "png" or "jpeg"
  include_header_footer: false     # Include page headers and footers in output

# --- Podcast extraction ---
podcast:
  enabled: true                    # Enable podcast extraction pipeline
  max_episodes: 10                 # Max episodes from an RSS feed (0 = unlimited)
  prefer_rss: true                 # Prefer feedparser for RSS feeds over yt-dlp

# --- Twitter/X extraction ---
twitter:
  enabled: true                    # Enable tweet/thread extraction pipeline
  nitter_instance: "nitter.poast.org"  # Primary Nitter instance for tweet fetching
  nitter_fallback_instances:       # Fallback Nitter instances if primary is down
    - "nitter.privacydev.net"
    - "nitter.woodland.cafe"
  timeout: 30                      # HTTP request timeout (seconds)
  user_agent_rotation: true        # Rotate User-Agent headers to avoid blocks
  verify_ssl: true                 # Set false for corporate firewalls with custom CA

# --- MarkItDown (file conversion engine) ---
markitdown:
  enabled: true                    # Use MarkItDown for file conversion (DOCX, PPTX, PDF, etc.)
  llm_enabled: false               # Enable Azure OpenAI for image descriptions in documents
  llm_model: null                  # Override deployment for MarkItDown LLM (null = default)

